<!DOCTYPE html>
<html>
<head>
<title>Contact Us</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
body{
font-family:Arial;
margin:0;
background:#f7f9fb;
}

.container{
max-width:1000px;
margin:auto;
padding:40px 20px;
}

.contact-box{
background:white;
padding:30px;
border-radius:12px;
}

input,textarea{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:6px;
}

textarea{
height:150px;
}

.btn{
background:#1e88e5;
color:white;
padding:12px 20px;
border:none;
border-radius:6px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>Contact Us</h1>

<div class="contact-box">

<p>Email: support@adultcarestore.co.uk</p>

<p>Phone: 0800 123 4567</p>

<p>Opening Hours: Monday - Friday, 9AM - 6PM</p>

<form>

<input type="text" placeholder="Your Name">

<input type="email" placeholder="Your Email">

<input type="tel" placeholder="Phone Number">

<textarea placeholder="Your Message"></textarea>

<button class="btn">
Send Message
</button>

</form>

</div>

</div>

</body>
</html>
