<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Shop | Adult Care Store</title>

<style>
body{margin:0;font-family:Arial,sans-serif;background:#f7f9fb;}
.top-bar{background:#0f172a;color:#fff;text-align:center;padding:10px;}
header{background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.08);}
.navbar{max-width:1200px;margin:auto;padding:15px;display:flex;justify-content:space-between;align-items:center;}
.nav-links a{text-decoration:none;margin-left:20px;color:#333;font-weight:bold;}
.container{max-width:1200px;margin:auto;padding:40px 20px;}
.shop-layout{display:grid;grid-template-columns:250px 1fr;gap:30px;}
.sidebar{background:#fff;padding:20px;border-radius:10px;}
.products{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:25px;}
.product{background:#fff;border-radius:12px;padding:15px;box-shadow:0 2px 10px rgba(0,0,0,.08);}
.product img{width:100%;height:220px;object-fit:cover;border-radius:8px;}
.btn{background:#1e88e5;color:#fff;padding:10px 20px;text-decoration:none;border-radius:6px;display:inline-block;}
footer{background:#111827;color:white;padding:40px;margin-top:50px;text-align:center;}
@media(max-width:768px){
.shop-layout{grid-template-columns:1fr;}
.navbar{flex-direction:column;}
}
</style>
</head>
<body>

<div class="top-bar">🚚 FREE DELIVERY OVER £50</div>

<header>
<div class="navbar">
<h2>Adult Care Store</h2>
<div class="nav-links">

<a href="contact.html">Contact</a>
<a href="cart.html">Cart</a>
</div>
</div>
</header>

<div class="container">

<h1>Shop Products</h1>

<div class="sidebar">
<h3>Categories</h3>
<p><input type="checkbox"> Adult Diapers</p>
<p><input type="checkbox"> Pull Up Pants</p>
<p><input type="checkbox"> Bed Pads</p>
<p><input type="checkbox"> Skin Care</p>
</div>

<div class="products">

<div class="product">
<img src="images/adult-diaper.jpg">
<h3>Premium Adult Diaper</h3>
<p>£19.99</p>
<a href="cart.html" class="btn">Add To Cart</a>
</div>

<div class="product">

</div>

</div>

</div>
</div>

<footer>
© 2026 Adult Care Store
</footer>

</body>
</html>
